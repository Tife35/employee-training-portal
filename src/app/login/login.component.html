<div class="login-container">
  <div class="login-card">
<h2 class="login-title">Login Page</h2>

<form [formGroup]="loginForm" (ngSubmit)="login()">

  <div class="form-group">
    <input type="email" placeholder="Email" formControlName="email" />

    <div class="error-message" *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)">
      <small *ngIf="loginForm.get('email')?.errors?.['required']">
        Email is required
      </small>

      <small *ngIf="loginForm.get('email')?.errors?.['email']">
        Enter a valid email
      </small>
    </div>
  </div>

  <!-- <br /> -->

  <div class="form-group">
    <input class="form-input" type="password" placeholder="Password" formControlName="password" />

    <div class="error-message" *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)">
      <small *ngIf="loginForm.get('password')?.errors?.['required']">
        Password is required
      </small>

      <small *ngIf="loginForm.get('password')?.errors?.['minlength']">
        Password must be at least 6 characters
      </small>
    </div>
  </div>

  <!-- <br /> -->

  <button class="btn-primary" type="submit">
    Login
  </button>

</form>

</div>

</div>
